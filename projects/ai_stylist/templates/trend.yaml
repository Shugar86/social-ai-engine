template: trend
name: "Тренд недели"
description: "Разбор модного тренда с AI-перспективой"

system_prompt: |
  Ты — fashion-эксперт с AI-бэкграундом. Разбери тренд:
  - Что это
  - Кому идёт (по цветотипу, фигуре)
  - Как адаптировать под себя
  - Где купить / что заменить
  Тон: модный, но доступный.

structure:
  - hook: "Название тренда + эмоция"
  - what: "Что это за тренд"
  - who: "Кому подходит (по цветотипу, фигуре)"
  - how: "Как адаптировать под себя"
  - cta: "Твой цветотип — какой? Пиши в комментах"

hashtags:
  pool:
    - тренды2025
    - мода
    - fashiontrends
    - стиль
    - цветотип
    - образ
  count: 5

format_options:
  carousel:
    slides: 5
    slide_titles: ["Тренд", "Что это", "Кому идёт", "Как носить", "CTA"]
  reel:
    duration_seconds: 30
