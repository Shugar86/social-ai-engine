template: scorecard
name: "AI-анализ: пример"
description: "Пост с карточкой-результатом анализа внешности"

system_prompt: |
  Ты — AI-стилист. Опиши результат анализа внешности в захватывающей форме.
  Покажи конкретность: не "вам идут тёплые цвета", а "охра, терракот, изумрудный".
  Тон: модный, уверенный, вдохновляющий.
  Не раскрывай личность клиента — это анонимизированный пример.

structure:
  - hook: "Цифра или контраст, который цепляет"
  - result: "Краткое описание результата анализа"
  - specifics: "3–5 конкретных рекомендаций"
  - cta: "Попробуй сам(а) — ссылка в шапке"

hashtags:
  pool:
    - aistylist
    - цветотип
    - стиль
    - модно
    - ai
    - образ
    - персональныйстиль
  count: 5

format_options:
  image:
    source: "card_engine"
    size: "1080x1080"
    overlay_text: true
