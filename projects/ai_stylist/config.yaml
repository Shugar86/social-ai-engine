# Конфигурация проекта: ai_stylist

project:
  name: "ai_stylist"
  display_name: "AI Stylist"
  timezone: "Europe/Moscow"
  language: "ru"

approval:
  mode: "manual"
  auto_publish_after: "24h"
  approvers:
    - type: "telegram"
      chat_id: "${AI_STYLIST_APPROVAL_CHAT_ID}"

publishing:
  platforms:
    - name: "instagram"
      credentials:
        ig_user_id: "${AI_STYLIST_IG_USER_ID}"
        access_token: "${AI_STYLIST_IG_ACCESS_TOKEN}"
      publish_times:
        - "10:00"
        - "14:00"
        - "18:00"
        - "21:00"
    - name: "telegram"
      credentials:
        bot_token: "${TELEGRAM_BOT_TOKEN}"
        channel_id: "${AI_STYLIST_TG_CHANNEL_ID}"
      enabled: false

generation:
  llm:
    provider: "openrouter"
    model: "openai/gpt-5.4"
    fallback_model: "anthropic/claude-sonnet-4"
    base_url: "https://openrouter.ai/api/v1"
  image:
    provider: "dalle3"
    size: "1024x1024"
  # Для ai_stylist аватар не нужен — используем готовые карточки
  templates_dir: "projects/ai_stylist/templates"
  reuse_assets:
    - source: "~/dev/ai-stylist/backend/card_engine.py"
      description: "Генератор 1080x1080 карточек-результатов"

content_plan:
  source: "projects/ai_stylist/content-plan.yaml"
  default_format: "image"

limits:
  max_posts_per_day: 4
  max_carousel_slides: 10
  caption_max_length: 2200
