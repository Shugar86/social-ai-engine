# Конфигурация проекта: doctor_yulia
# Все секреты — только в .env, здесь только публичные настройки.

project:
  name: "doctor_yulia"
  display_name: "Доктор Юлия — Косметолог"
  timezone: "Europe/Moscow"
  language: "ru"

approval:
  mode: "manual"          # "manual" | "auto"
  auto_publish_after: "24h"
  approvers:
    - type: "telegram"
      chat_id: "${DOCTOR_YULIA_APPROVAL_CHAT_ID}"

publishing:
  platforms:
    - name: "instagram"
      credentials:
        ig_user_id: "${DOCTOR_YULIA_IG_USER_ID}"
        access_token: "${DOCTOR_YULIA_IG_ACCESS_TOKEN}"
      publish_times:
        - "09:00"
        - "15:00"
        - "19:00"
    - name: "telegram"
      credentials:
        bot_token: "${TELEGRAM_BOT_TOKEN}"
        channel_id: "${DOCTOR_YULIA_TG_CHANNEL_ID}"
      enabled: false       # Включаем когда будет канал

generation:
  llm:
    provider: "openrouter"
    model: "openai/gpt-5.4"
    fallback_model: "anthropic/claude-sonnet-4"
    base_url: "https://openrouter.ai/api/v1"
  image:
    provider: "dalle3"
    size: "1024x1024"
  avatar:
    provider: "heygen"
    avatar_id: "${DOCTOR_YULIA_HEYGEN_AVATAR_ID}"
    voice_id: "${DOCTOR_YULIA_HEYGEN_VOICE_ID}"
  templates_dir: "projects/doctor_yulia/templates"

content_plan:
  source: "projects/doctor_yulia/content-plan.yaml"
  default_format: "carousel"

limits:
  max_posts_per_day: 3
  max_carousel_slides: 10
  caption_max_length: 2200
