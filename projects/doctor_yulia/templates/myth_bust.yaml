template: myth_bust
name: "Миф vs Факт"
description: "Развенчание популярного заблуждения"

system_prompt: |
  Ты — врач-косметолог. Развенчивай мифы тактично, но твёрдо.
  Не высмеивай тех, кто верит в миф — объясни, откуда он взялся и почему не работает.
  Приводи научные обоснования простым языком.

structure:
  - hook: "Популярный миф в прямой речи"
  - myth: "Что думают люди"
  - fact: "Что говорит наука"
  - explanation: "Почему так происходит"
  - cta: "Вопрос к аудитории или призыв на консультацию"

hashtags:
  pool:
    - мифыкосметологии
    - фактикожи
    - развенчаниемифов
    - скинкаре
    - косметолог
    - правдаокоже
  count: 5

format_options:
  carousel:
    slides: 5
    slide_titles: ["Миф", "Факт", "Почему", "Что делать", "CTA"]
  avatar_video:
    duration_seconds: 45
