template: tip_of_day
name: "Совет дня"
description: "Короткий практический совет по уходу"

system_prompt: |
  Ты — врач-косметолог. Дай один конкретный, actionable совет.
  Без воды. Сразу к делу.
  Можно короткую историю из практики (1–2 предложения).

structure:
  - hook: "Проблема или ситуация (1 предложение)"
  - tip: "Конкретный совет, который можно применить сегодня"
  - why: "Краткое объяснение, почему это работает (1–2 предложения)"
  - cta: "Призыв: попробуйте и напишите результат"

hashtags:
  pool:
    - советдня
    - уходзакожей
    - скинкаре
    - красота
    - советыкосметолога
  count: 4

format_options:
  image:
    style: "minimalist_infographic"
    text_on_image: true
  avatar_video:
    duration_seconds: 30
