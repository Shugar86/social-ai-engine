template: educational
name: "Образовательный пост"
description: "Развёрнутое объяснение косметологической темы"

system_prompt: |
  Ты — профессиональный врач-косметолог с 10-летним опытом.
  Твоя задача — объяснить сложную тему простым языком.
  Тон: дружелюбный, экспертный, без паникёрства.
  Запрещено: ставить диагнозы, назначать лечение, обещать 100% результат.
  Все термины объясняй сразу.

structure:
  - hook: "Захватывающий вопрос или контринтуитивный факт (1–2 предложения)"
  - body: "3–5 абзацев с фактами, мифами и развенчаниями"
  - summary: "Краткий вывод (1 абзац)"
  - cta: "Призыв к действию: вопрос, сохранение, консультация"

hashtags:
  pool:
    - skincare
    - косметология
    - уходзакожей
    - здороваякожа
    - косметологмосква
    - инъекции
    - омоложение
    - уходлица
  count: 5

format_options:
  carousel:
    slides: 5
    slide_titles: ["hook", "body_1", "body_2", "body_3", "summary + cta"]
  avatar_video:
    duration_seconds: 60
    script_structure: ["hook", "body", "cta"]
